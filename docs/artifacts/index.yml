title: Azure Artifacts documentation
summary: Create, host, and share NuGet, npm, Maven, Python, Cargo, and Universal Packages with Azure Artifacts. Manage feeds, configure upstream sources, and support package publishing and consumption across teams and organizations.

metadata:
